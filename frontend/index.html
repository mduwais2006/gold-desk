<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gold Desk Premium - The world's most secure and beautiful jewelry shop management system. Fast, responsive, and unhackable." />
    <meta name="keywords" content="Jewelry Shop Management, Gold Desk, Premium Billing, Secure POS, Thermal Printing" />
    <meta name="author" content="Gold Desk Team" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://golddesk.premium" />
    <meta property="og:title" content="Gold Desk Premium | Jewelry Management" />
    <meta property="og:description" content="The world's most secure and beautiful jewelry shop management system." />
    <meta property="og:image" content="/logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Gold Desk Premium | Jewelry Management" />
    <meta property="twitter:description" content="The world's most secure and beautiful jewelry shop management system." />
    <meta property="twitter:image" content="/logo.png" />

    <!-- Ultra-Strict Anti-Hacking Rules -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self' http://localhost:* ws://localhost:* https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; frame-src 'self' https://gold-desk-a6211.firebaseapp.com; object-src 'none'; base-uri 'self';" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Gold Desk Premium | Expert Jewelry Shop Management</title>

    <!-- Performance Optimization: DNS Prefetch & Preconnect -->
    <link rel="dns-prefetch" href="http://localhost:5000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="http://localhost:5000">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
        if (theme === 'dark') document.documentElement.style.backgroundColor = '#0f172a';
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
